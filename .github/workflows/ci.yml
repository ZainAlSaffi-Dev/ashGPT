name: CI

on:
  push:
    branches: [main, experimental, frontend]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Run unit tests (skip integration that need API keys)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -q \
            --ignore=tests/test_phase1_indexing.py \
            --ignore=tests/test_phase2_retrieval.py \
            --ignore=tests/test_phase3_nodes.py \
            --ignore=tests/test_phase4_graph.py \
            --ignore=tests/test_phase5_eval.py \
            --ignore=tests/test_chat_memory.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit
