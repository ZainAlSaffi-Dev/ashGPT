services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lawgpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawgpt
      POSTGRES_PASSWORD: lawgpt
      POSTGRES_DB: lawgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawgpt -d lawgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/Containerfile
    container_name: lawgpt-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      STORAGE_BACKEND: local
      DATABASE_URL: postgresql+psycopg://lawgpt:lawgpt@postgres:5432/lawgpt
      VECTOR_BACKEND: pgvector
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_chroma:/app/chroma_db
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Enabled once Phase 3 initialises the Next.js app.
  frontend:
    profiles: ["frontend"]
    image: node:20-alpine
    container_name: lawgpt-frontend
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_chroma:
  backend_data:
  frontend_node_modules:
