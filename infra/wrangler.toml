name = "lawgpt-edge"
main = "worker/src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs: surface console.log/error from the Worker in the dashboard
# (and `wrangler tail`). invocation_logs adds the request/response summary.

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

# ── Backend container ────────────────────────────────────────────────────────
# Cloudflare Containers run the FastAPI app close to the edge. The Worker
# (above) sits in front to validate Clerk JWTs, issue R2 presigned PUTs, and
# proxy authenticated requests through to the container.

[[containers]]
class_name = "LawgptBackend"
image = "../backend/Containerfile"
instance_type = "standard-1"
max_instances = 5

# ── R2 bucket (raw uploads) ──────────────────────────────────────────────────

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "lawgpt-uploads"

# ── Vectors: external Postgres + pgvector (Neon) ────────────────────────────
# Zembed embeddings are 2560-dim; Cloudflare Vectorize caps at 1536, so we
# use Postgres + pgvector via DATABASE_URL secret instead.

# ── D1 (relational metadata: users, files, sessions, messages, exams) ────────

[[d1_databases]]
binding = "DB"
database_name = "lawgpt-prod"
database_id = "02f7936a-d1f7-44bc-8b2e-0488dcdc1ecb"

# ── Durable Object that wraps the container instance ─────────────────────────

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "LawgptBackend"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LawgptBackend"]

# ── Public-facing vars (non-secret) ──────────────────────────────────────────

[vars]
CLERK_ISSUER = "https://solid-fly-14.clerk.accounts.dev"
CORS_ORIGINS = "https://lawgpt-15s.pages.dev,http://localhost:3000"
R2_BUCKET = "lawgpt-uploads"
R2_ACCOUNT_ID = "b7fc20f146b05722922360bd1310aa3a"

# Secrets (set via `wrangler secret put` — never commit values):
#   DATABASE_URL       Neon Postgres connection string
#   CLERK_SECRET_KEY
#   OPENAI_API_KEY
#   GOOGLE_API_KEY
#   ZEMBED_API_KEY
#   COHERE_API_KEY
#   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY (Worker presign)
#   R2_ACCESS_KEY / R2_SECRET_KEY (backend boto3 alt names)
