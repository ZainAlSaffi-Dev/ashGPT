# Cloudflare Workers config. Bindings wired in Phase 6 (Deploy).
# Until then this is a placeholder so `wrangler` recognises the project.

name = "lawgpt-edge"
main = "src/index.ts"          # Phase 6: thin edge router (auth verify, R2 presign, proxy to container)
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Bindings (added in Phase 6 — left commented as documentation of intent)
#
# [[d1_databases]]
# binding = "DB"
# database_name = "lawgpt-prod"
# database_id = "<filled by `wrangler d1 create`>"
#
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "lawgpt-uploads"
#
# [[vectorize]]
# binding = "VECTORS"
# index_name = "lawgpt-vectors"
#
# [[containers]]
# class_name = "BackendContainer"
# image = "./Containerfile"
# instance_type = "standard"
# max_instances = 5
#
# [vars]
# CLERK_ISSUER = "https://<your-clerk-domain>.clerk.accounts.dev"
#
# Secrets (set via `wrangler secret put <NAME>`):
#   OPENAI_API_KEY, GOOGLE_API_KEY, ZEMBED_API_KEY, COHERE_API_KEY, CLERK_SECRET_KEY
