name = "lawgpt-edge"
main = "worker/src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Backend container ────────────────────────────────────────────────────────
# Cloudflare Containers run the FastAPI app close to the edge. The Worker
# (above) sits in front to validate Clerk JWTs, issue R2 presigned PUTs, and
# proxy authenticated requests through to the container.

[[containers]]
class_name = "LawgptBackend"
image = "./Containerfile"
instance_type = "standard"
max_instances = 5

# ── R2 bucket (raw uploads) ──────────────────────────────────────────────────

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "lawgpt-uploads"

# ── Vectorize (per-user namespaces) ──────────────────────────────────────────

[[vectorize]]
binding = "VECTORS"
index_name = "lawgpt-vectors"

# ── D1 (relational metadata: users, files, sessions, messages, exams) ────────

[[d1_databases]]
binding = "DB"
database_name = "lawgpt-prod"
database_id = "REPLACE_WITH_OUTPUT_OF_wrangler_d1_create"

# ── Durable Object that wraps the container instance ─────────────────────────

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "LawgptBackend"

[[migrations]]
tag = "v1"
new_classes = ["LawgptBackend"]

# ── Public-facing vars (non-secret) ──────────────────────────────────────────

[vars]
CLERK_ISSUER = "https://CHANGE-ME.clerk.accounts.dev"

# Secrets (set via `wrangler secret put`):
#   CLERK_SECRET_KEY
#   OPENAI_API_KEY
#   GOOGLE_API_KEY
#   ZEMBED_API_KEY
#   COHERE_API_KEY
